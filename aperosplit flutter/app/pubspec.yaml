name: aperosplit_flutter
description: AperoSplit - Partage de dépenses de groupe
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # HTTP
  http: ^1.2.2

  # UI
  flutter_animate: ^4.5.2

  # Charts
  fl_chart: ^0.70.2

  # Storage
  shared_preferences: ^2.3.4

  # Images
  image_picker: ^1.1.2

  # QR Code
  qr_flutter: ^4.1.0

  # Biometrics
  local_auth: ^2.3.0

  # Date
  intl: any

  # CSV
  csv: ^6.0.0
  path_provider: ^2.1.5
  share_plus: ^10.1.4

  # Utils
  uuid: ^4.5.1
  collection: ^1.19.1

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
