<!DOCTYPE html>
<html lang="fr">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="AperoSplit - Partage de dépenses de groupe">
  <meta name="theme-color" content="#8B5CF6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AperoSplit">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="AperoSplit">
  <meta name="msapplication-TileColor" content="#8B5CF6">

  <!-- iOS icons -->
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-192.png">

  <!-- Splash screens iOS -->
  <link rel="apple-touch-startup-image" href="icons/icon-512.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>AperoSplit</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #8B5CF6;
      overflow: hidden;
    }
    /* Splash screen while Flutter loads */
    #loading {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #8B5CF6, #6366F1);
      z-index: 9999;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: white;
      transition: opacity 0.3s;
    }
    #loading .icon {
      width: 80px; height: 80px;
      background: rgba(255,255,255,0.2);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin-bottom: 20px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    #loading h1 {
      font-size: 24px;
      font-weight: 700;
      margin: 0 0 8px 0;
      letter-spacing: -0.5px;
    }
    #loading p {
      font-size: 14px;
      opacity: 0.8;
      margin: 0;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
  </style>
</head>
<body>
  <!-- Splash screen -->
  <div id="loading">
    <div class="icon">🎉</div>
    <h1>AperoSplit</h1>
    <p>Chargement...</p>
  </div>

  <script>
    // Hide splash when Flutter is ready
    window.addEventListener('flutter-first-frame', function() {
      var el = document.getElementById('loading');
      if (el) {
        el.style.opacity = '0';
        setTimeout(function() { el.remove(); }, 300);
      }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
